project:
  name: medguard-cxr
  phase: 3
  description: "RSNA Pneumonia Detection localization fallback configuration."

seed: 2026

data:
  dataset: rsna-pneumonia-detection
  root: data/rsna
  image_dir: stage_2_train_images
  labels_csv: stage_2_train_labels.csv
  detailed_class_info_csv: stage_2_detailed_class_info.csv
  manifest_csv:
  include_negative: false
  labels:
    - Lung Opacity

split:
  eval: val
  val_fraction: 0.20
  test_fraction: 0.00
  note: "RSNA public train labels are split deterministically by patientId; hidden Kaggle test labels are not used."

preprocessing:
  image_size: 224
  channels: 3
  normalization:
    active: imagenet
    imagenet_mean: [0.485, 0.456, 0.406]
    imagenet_std: [0.229, 0.224, 0.225]

gradcam:
  method: gradcam
  secondary_method: gradcam_plus_plus
  target_layer: last_conv_before_global_average_pooling
  confidence_gate: 0.70
  skip_abstained: true
  cam_threshold: 0.60
  target_class_mapping:
    Pneumonia:
      - Lung Opacity
  postprocessing:
    smoothing_sigma: 0.0
    border_suppression_fraction: 0.0
    border_artifact_fraction: 0.05

localization:
  iou_threshold: 0.50
  evaluation:
    max_samples: all
    overlay_count: 20
  metrics:
    - mean_iou
    - map_at_0_5
    - pointing_game_accuracy
  outputs:
    metrics_json: results/grounding_rsna_eval.json
    overlay_dir: results/overlays/rsna

safety:
  note: "RSNA overlays are research-only engineering artifacts; lung-opacity boxes are not clinically validated evidence."

phase_gate:
  phase4_entry_status: blocked_until_real_localization_audit
  accepted_real_localization_datasets:
    - vindr-cxr
    - rsna-pneumonia-detection
  require_real_localization_before_phase4: true
  synthetic_smoke_is_blocking_for_phase4: true
  required_before_phase4:
    - local RSNA Pneumonia or VinDr-CXR images and box annotations available under data.root
    - real localization metrics written to results/grounding_rsna_eval.json or results/grounding_vindr_eval.json
    - Phase 3B visual audit rerun on real overlays
    - owner approval after real-data audit
