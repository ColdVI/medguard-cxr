project:
  name: medguard-cxr
  phase: 4
  description: "VQA + safety-aware assistant configuration."

seed: 2026
mode: vlm_optional
status: implemented_disabled_by_default

vqa:
  templates_version: "v1"
  n_distractors_per_image: 2
  include_uncertain: true
  input_manifest: results/rsna_manifest.csv
  max_manifest_records: 4096
  output:
    train_jsonl: data/vqa/synthetic_qa.train.jsonl
    val_jsonl: data/vqa/synthetic_qa.val.jsonl
    test_jsonl: data/vqa/synthetic_qa.test.jsonl

# Phase 4B remains optional. Training is disabled by default even though the
# adapter-only PEFT/QLoRA loop is implemented; enable it explicitly on a GPU
# runtime after VQA JSONL files exist.
vlm:
  enabled: false
  base_model: "Qwen/Qwen2.5-VL-3B-Instruct"
  trust_remote_code: true
  load_in_4bit: true
  compute_dtype: float16
  quantization:
    method: nf4
    double_quant: true
    bnb_4bit_quant_type: nf4
    bnb_4bit_use_double_quant: true
  zero_shot:
    output: results/vlm_zero_shot_eval.json
    max_new_tokens: 128
    temperature: 0.0
    do_sample: false
  adapter:
    path: checkpoints/vlm_lora_adapter
    save_adapter_only: true
  lora:
    r: 16
    alpha: 32
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
    dropout: 0.05
    task_type: CAUSAL_LM
  training:
    enabled: false
    classifier_checkpoint_is_smoke: false
    epochs: 3
    batch_size: 4
    eval_batch_size: 1
    grad_accum: 4
    learning_rate: 2.0e-4
    scheduler: cosine
    warmup_steps: 100
    max_seq_length: 512
    max_steps:
    max_train_samples:
    max_val_samples:
    logging_steps: 10
    save_strategy: epoch
    eval_strategy: epoch
    save_total_limit: 2
    optim: paged_adamw_8bit
    gradient_checkpointing: true
    overwrite_output_dir: true
    early_stopping_patience: 2
    output_report: results/vlm_lora_train.json

safety:
  banner_text: "constant in code; do not override here"
  enforce_disclaimer: true
  enforce_provenance: true
  reject_on_clinical_token: true
  hallucination_filter: true
  max_answer_tokens: 200
